<body>
    <div class="register-container">
        <div class="register-header">
            <div class="logo">
                <h1>Trend<span style="color: #00FFFF;">Tactics</span> <span style="color: #FF6B6B;">Client</span></h1>
            </div>
            <h1>Client Account Registration</h1>
            <p>Create your client portal account</p>
        </div>
        
        <div class="register-form">
            <div id="alert" class="alert"></div>
            
            <form id="registerForm" method="post">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group password-toggle">
                    <label for="password">Password <small>(min. 8 characters, 1 uppercase, 1 lowercase, 1 number, 1 special char)</small></label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required minlength="8">
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="form-group password-toggle">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
                    <button type="button" class="toggle-password" id="toggleConfirmPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="/terms.html">Terms of Service</a> and <a href="/privacy.html">Privacy Policy</a></label>
                </div>
                
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <span id="registerText">Create Account</span>
                    <span id="loadingSpinner" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> Creating account...
                    </span>
                </button>
            </form>
            
            <!-- Demo login removed for production security -->
            
            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <!-- Load Supabase SDK first -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-utils.js"></script>
    <script>
        // Use the shared Supabase client from supabase-utils.js
        const supabase = window.supabaseUtils.supabase;
        
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        // Toggle confirm password visibility
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const icon = this.querySelector('i');
            
            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                confirmPasswordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            console.log('Registration form submission intercepted');
            e.preventDefault();
            console.log('Registration default prevented');
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            const registerText = document.getElementById('registerText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const alert = document.getElementById('alert');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                showAlert('Passwords do not match. Please try again.', 'error');
                return;
            }
            
            // Validate password strength
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordRegex.test(password)) {
                showAlert('Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, one number, and one special character.', 'error');
                return;
            }
            
            // Show loading state
            registerText.style.display = 'none';
            loadingSpinner.style.display = 'inline';
            registerBtn.disabled = true;
            
            try {
                console.log('Attempting registration with:', { email, fullName });
                
                // Sign up with Supabase
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName
                        }
                    }
                });
                
                console.log('Supabase response:', { data, error });
                
                if (error) throw error;
                
                // Show success message based on response
                if (data.user) {
                    showAlert('Account created successfully! Redirecting to dashboard...', 'success');
                    
                    // Redirect to dashboard after a short delay
                    setTimeout(() => {
                        window.location.href = '/client-dashboard.html';
                    }, 2000);
                } else {
                    // Email confirmation required
                    showAlert('Account created! Please check your email for confirmation link.', 'success');
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                if (error.message.includes('already registered')) {
                    showAlert('This email is already registered. Please try logging in instead.', 'error');
                } else {
                    showAlert('Registration failed: ' + error.message, 'error');
                }
                
                // Reset loading state
                registerText.style.display = 'inline';
                loadingSpinner.style.display = 'none';
                registerBtn.disabled = false;
            }
        });
        
        // Demo login removed for production security
        
        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
            
            // Hide alert after 5 seconds
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
    </script>



<script>
    document.addEventListener('DOMContentLoaded', function() {
        const phrases = [
            "Welcome to Trendtactics Digital",
            "Read our latest blog: The Future of AI",
            "Next Event: Digital Growth Webinar - Oct 25",
            "Scale your revenue with our experts",
            "" 
        ];
        let i = 0;
        let j = 0;
        let currentPhrase = [];
        let isDeleting = false;
        let isEnd = false;
        
        const typeWriterElement = document.getElementById('typewriter-text');
        
        function loop() {
            if (!typeWriterElement) return;
            
            // Add live time to the last phrase dynamically
            phrases[4] = "Current Local Time: " + new Date().toLocaleTimeString();
            
            isEnd = false;
            typeWriterElement.innerHTML = currentPhrase.join('');
            
            if (i < phrases.length) {
                if (!isDeleting && j <= phrases[i].length) {
                    currentPhrase.push(phrases[i][j]);
                    j++;
                    typeWriterElement.innerHTML = currentPhrase.join('');
                }
                
                if (isDeleting && j <= phrases[i].length) {
                    currentPhrase.pop();
                    j--;
                    typeWriterElement.innerHTML = currentPhrase.join('');
                }
                
                if (j == phrases[i].length) {
                    isEnd = true;
                    isDeleting = true;
                }
                
                if (isDeleting && j === 0) {
                    currentPhrase = [];
                    isDeleting = false;
                    i++;
                    if (i === phrases.length) {
                        i = 0;
                    }
                }
            }
            
            const speeding = Math.random() * (50 - 30) + 30;
            const normal = Math.random() * (100 - 50) + 50;
            const time = isEnd ? 2000 : isDeleting ? speeding : normal;
            
            setTimeout(loop, time);
        }
        
        if (typeWriterElement) {
            loop();
        }
    });
</script>
