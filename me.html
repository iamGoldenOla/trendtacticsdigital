    <div class="login-container">
        <div class="login-header">
            <h1>Admin Login</h1>
            <p>Sign in to manage the academy</p>
        </div>
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="index" style="color: #764ba2; text-decoration: none; font-size: 0.9rem;"><i
                    class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
        <form class="login-form" id="adminLoginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-utils.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = this.querySelector('button[type="submit"]');

            errorMsg.textContent = '';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';

            try {
                if (window.supabaseUtils) {
                    const result = await window.supabaseUtils.loginUser(email, password);
                    if (result.success) {
                        // Set admin flags
                        localStorage.setItem('isAdmin', 'true');
                        localStorage.setItem('adminLoggedIn', 'true');
                        window.location.href = 'dashboard.html';
                    } else {
                        errorMsg.textContent = 'Login failed: ' + (result.error || 'Invalid credentials');
                    }
                } else {
                    errorMsg.textContent = 'Authentication system not loaded. Please refresh and try again.';
                }
            } catch (err) {
                errorMsg.textContent = 'An unexpected error occurred.';
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>

    <!-- Floating Language Selector -->








    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const phrases = [
                "Welcome to Trendtactics Digital",
                "Read our latest blog: The Future of AI",
                "Next Event: Digital Growth Webinar - Oct 25",
                "Scale your revenue with our experts",
                ""
            ];
            let i = 0;
            let j = 0;
            let currentPhrase = [];
            let isDeleting = false;
            let isEnd = false;

            const typeWriterElement = document.getElementById('typewriter-text');

            function loop() {
                if (!typeWriterElement) return;

                // Add live time to the last phrase dynamically
                phrases[4] = "Current Local Time: " + new Date().toLocaleTimeString();

                isEnd = false;
                typeWriterElement.innerHTML = currentPhrase.join('');

                if (i < phrases.length) {
                    if (!isDeleting && j <= phrases[i].length) {
                        currentPhrase.push(phrases[i][j]);
                        j++;
                        typeWriterElement.innerHTML = currentPhrase.join('');
                    }

                    if (isDeleting && j <= phrases[i].length) {
                        currentPhrase.pop();
                        j--;
                        typeWriterElement.innerHTML = currentPhrase.join('');
                    }

                    if (j == phrases[i].length) {
                        isEnd = true;
                        isDeleting = true;
                    }

                    if (isDeleting && j === 0) {
                        currentPhrase = [];
                        isDeleting = false;
                        i++;
                        if (i === phrases.length) {
                            i = 0;
                        }
                    }
                }

                const speeding = Math.random() * (50 - 30) + 30;
                const normal = Math.random() * (100 - 50) + 50;
                const time = isEnd ? 2000 : isDeleting ? speeding : normal;

                setTimeout(loop, time);
            }

            if (typeWriterElement) {
                loop();
            }
        });
    </script>
