<body>
    <div class="container">
        <h1>🔍 Supabase Client Test</h1>
        <p>This page tests if both Supabase clients are properly loaded and initialized.</p>
        
        <div id="results"></div>
        
        <button onclick="runTest()">Run Test</button>
        <button onclick="testConnection()">Test Academy Connection</button>
        
        <div id="output" style="margin-top: 20px;"></div>
    </div>

    <script>
        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('output').innerHTML = '';
        }
        
        async function runTest() {
            clearResults();
            addResult('🔍 Running Supabase Client Test...', 'info');
            
            // Check main website client
            if (typeof window.supabaseUtils !== 'undefined') {
                addResult('✅ Main website Supabase client loaded', 'success');
                addResult(`   URL: ${window.supabaseUtils.supabase.supabaseUrl}`, 'info');
            } else {
                addResult('❌ Main website Supabase client NOT loaded', 'error');
            }
            
            // Check Academy client
            if (typeof window.academySupabaseUtils !== 'undefined') {
                addResult('✅ Academy Supabase client loaded', 'success');
                if (window.academySupabaseUtils.isInitialized) {
                    addResult('   Status: ✅ Initialized', 'success');
                    addResult(`   URL: ${window.academySupabaseUtils.supabase.supabaseUrl}`, 'info');
                } else {
                    addResult('   Status: ⚠️  Not initialized (check credentials)', 'warning');
                }
            } else {
                addResult('❌ Academy Supabase client NOT loaded', 'error');
            }
            
            addResult('📋 Test complete!', 'info');
        }
        
        async function testConnection() {
            const output = document.getElementById('output');
            output.innerHTML = '<p>Testing Academy connection...</p>';
            
            try {
                if (!window.academySupabaseUtils || !window.academySupabaseUtils.isInitialized) {
                    throw new Error('Academy Supabase client not initialized');
                }
                
                // Try a simple query to test connection
                const { data, error } = await window.academySupabaseUtils.supabase
                    .from('courses')
                    .select('count')
                    .limit(1);
                
                if (error && error.code !== '42501') { // 42501 is permission denied, which is expected
                    throw new Error(`Connection test failed: ${error.message}`);
                }
                
                output.innerHTML = `
                    <div class="result success">
                        <h3>✅ Academy Connection Successful</h3>
                        <p>Connected to Academy Supabase project:</p>
                        <pre>${window.academySupabaseUtils.supabase.supabaseUrl}</pre>
                        <p>✅ Database connection working!</p>
                    </div>
                `;
            } catch (error) {
                output.innerHTML = `
                    <div class="result error">
                        <h3>❌ Academy Connection Failed</h3>
                        <p>Error: ${error.message}</p>
                        <p>Possible causes:</p>
                        <ul>
                            <li>Invalid Academy project credentials</li>
                            <li>Courses table doesn't exist yet</li>
                            <li>Network connectivity issues</li>
                        </ul>
                    </div>
                `;
            }
        }
        
        // Run test automatically when page loads
        window.addEventListener('load', runTest);
    </script>



<script>
    document.addEventListener('DOMContentLoaded', function() {
        const phrases = [
            "Welcome to Trendtactics Digital",
            "Read our latest blog: The Future of AI",
            "Next Event: Digital Growth Webinar - Oct 25",
            "Scale your revenue with our experts",
            "" 
        ];
        let i = 0;
        let j = 0;
        let currentPhrase = [];
        let isDeleting = false;
        let isEnd = false;
        
        const typeWriterElement = document.getElementById('typewriter-text');
        
        function loop() {
            if (!typeWriterElement) return;
            
            // Add live time to the last phrase dynamically
            phrases[4] = "Current Local Time: " + new Date().toLocaleTimeString();
            
            isEnd = false;
            typeWriterElement.innerHTML = currentPhrase.join('');
            
            if (i < phrases.length) {
                if (!isDeleting && j <= phrases[i].length) {
                    currentPhrase.push(phrases[i][j]);
                    j++;
                    typeWriterElement.innerHTML = currentPhrase.join('');
                }
                
                if (isDeleting && j <= phrases[i].length) {
                    currentPhrase.pop();
                    j--;
                    typeWriterElement.innerHTML = currentPhrase.join('');
                }
                
                if (j == phrases[i].length) {
                    isEnd = true;
                    isDeleting = true;
                }
                
                if (isDeleting && j === 0) {
                    currentPhrase = [];
                    isDeleting = false;
                    i++;
                    if (i === phrases.length) {
                        i = 0;
                    }
                }
            }
            
            const speeding = Math.random() * (50 - 30) + 30;
            const normal = Math.random() * (100 - 50) + 50;
            const time = isEnd ? 2000 : isDeleting ? speeding : normal;
            
            setTimeout(loop, time);
        }
        
        if (typeWriterElement) {
            loop();
        }
    });
</script>
