<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Dashboard - Website Solutions Leads</title>
  <link rel="stylesheet" href="/styles/main.css">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-utils.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #061226; color: #fff; font-family: 'Inter', sans-serif; }
    .admin-container { max-width: 1200px; margin: 40px auto; padding: 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
    .btn-export { background: #0047FF; color: #061226; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: #000000; border-radius: 8px; overflow: hidden; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    th { background: #0f2a55; color: #0047FF; font-size: 0.85rem; text-transform: uppercase; }
    td { font-size: 0.9rem; color: #cbd5e1; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; background: rgba(0,255,255,0.1); color: #0047FF; }
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 1000; justify-content:center; align-items:center; }
    .modal-content { background:#000000; padding:30px; border-radius:12px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; }
    .modal-close { float:right; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h2>Website Solutions Leads <span style="font-size:0.5em;color:#888;">(Admin)</span></h2>
      <div>
        <button class="btn-export" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
      </div>
    </div>
    
    <div id="auth-section">
      <p>Please log in to view leads.</p>
      <input type="email" id="adminEmail" placeholder="Admin Email" style="padding:10px; margin-right:10px; background:#0f2a55; border:1px solid #334155; color:#fff;">
      <input type="password" id="adminPass" placeholder="Password" style="padding:10px; margin-right:10px; background:#0f2a55; border:1px solid #334155; color:#fff;">
      <button onclick="adminLogin()" class="btn-export">Login</button>
    </div>

    <div id="data-section" style="display:none;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Business</th>
            <th>Selected Types</th>
            <th>Budget</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="leads-body">
          <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="detailsModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="document.getElementById('detailsModal').style.display='none'">&times;</button>
      <h3 id="modalName">Lead Details</h3>
      <div id="modalContent" style="margin-top:20px; line-height:1.6; color:#cbd5e1;"></div>
    </div>
  </div>

  <script>
    let allLeads = [];

    async function adminLogin() {
      const email = document.getElementById('adminEmail').value;
      const pass = document.getElementById('adminPass').value;
      if(window.supabaseUtils) {
        const {data, error} = await window.supabaseUtils.supabase.auth.signInWithPassword({email, password: pass});
        if(error) alert(error.message);
        else loadLeads();
      }
    }

    async function checkAuth() {
      if(window.supabaseUtils) {
        const {data} = await window.supabaseUtils.supabase.auth.getSession();
        if(data.session) loadLeads();
      }
    }

    async function loadLeads() {
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('data-section').style.display = 'block';
      
      const {data, error} = await window.supabaseUtils.supabase
        .from('website_solutions_leads')
        .select('*')
        .order('created_at', {ascending: false});
        
      if(error) {
        document.getElementById('leads-body').innerHTML = `<tr><td colspan="6">Error loading leads: ${error.message} <br><small>If the table does not exist, you need to create 'website_solutions_leads' in Supabase with appropriate columns.</small></td></tr>`;
        return;
      }
      
      allLeads = data;
      const tbody = document.getElementById('leads-body');
      tbody.innerHTML = '';
      
      if(data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No leads found yet.</td></tr>';
        return;
      }
      
      data.forEach(lead => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${new Date(lead.created_at).toLocaleDateString()}</td>
          <td>${lead.full_name}<br><small><a href="mailto:${lead.email}" style="color:#0047FF;">${lead.email}</a></small></td>
          <td>${lead.business_name}</td>
          <td>${lead.selected_types || '-'}</td>
          <td><span class="status-badge">${lead.budget || '-'}</span></td>
          <td><button onclick="viewLead('${lead.id}')" style="background:#0f2a55; border:1px solid #0047FF; color:#0047FF; padding:5px 10px; border-radius:4px; cursor:pointer;">View Details</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function viewLead(id) {
      const lead = allLeads.find(l => l.id === id);
      if(!lead) return;
      
      document.getElementById('modalName').textContent = `Project for ${lead.business_name}`;
      
      let html = `
        <p><strong>Contact:</strong> ${lead.full_name} | ${lead.email} | Phone: ${lead.phone} | WA: ${lead.whatsapp || '-'}</p>
        <hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">
        <p><strong>Website Types:</strong> ${lead.selected_types}</p>
        <p><strong>Features:</strong> ${lead.features}</p>
        <p><strong>Budget:</strong> ${lead.budget} | <strong>Timeline:</strong> ${lead.timeline}</p>
        <hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">
        <p><strong>Goals:</strong><br>${lead.goals}</p>
        <hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">
        <p><strong>Branding Status:</strong></p>
        <ul style="list-style:none; padding:0; margin:0;">
          <li>Logo: ${lead.has_logo} | Colors: ${lead.has_colors}</li>
          <li>Existing Site: ${lead.has_website} | Domain: ${lead.has_domain} | Hosting: ${lead.has_hosting}</li>
        </ul>
        <hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">
        <p><strong>Inspiration Links:</strong><br>${lead.inspiration || 'None provided'}</p>
      `;
      
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('detailsModal').style.display = 'flex';
    }

    function exportCSV() {
      if(!allLeads.length) return alert('No data to export');
      
      const headers = ['Date', 'Name', 'Business', 'Email', 'Phone', 'WhatsApp', 'Types', 'Features', 'Budget', 'Timeline', 'Goals'];
      const rows = allLeads.map(l => [
        new Date(l.created_at).toLocaleDateString(),
        `"${(l.full_name || '').replace(/"/g, '""')}"`,
        `"${(l.business_name || '').replace(/"/g, '""')}"`,
        l.email,
        l.phone,
        l.whatsapp,
        `"${(l.selected_types || '').replace(/"/g, '""')}"`,
        `"${(l.features || '').replace(/"/g, '""')}"`,
        l.budget,
        l.timeline,
        `"${(l.goals || '').replace(/"/g, '""')}"`
      ]);
      
      const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `leads_export_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    window.onload = () => {
      setTimeout(checkAuth, 1000); // Give supabase time to load
    };
  </script>
</body>
</html>
