    <script>
        // Debug logging function
        function log(message, type = 'info') {
            const debugLog = document.getElementById('debug-log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            debugLog.appendChild(logEntry);
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }

        // Update status display
        function updateStatus(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // Check function availability
        function checkFunctions() {
            log('🔍 Checking function availability...');
            
            const functions = [
                'enrollInLearningPath',
                'showLearningPathEnrollmentModal',
                'showStudentChoiceModal',
                'processLearningPathEnrollment',
                'showNotification',
                'closeModal'
            ];
            
            let availableCount = 0;
            let functionStatus = '';
            
            functions.forEach(funcName => {
                const available = typeof window[funcName] === 'function';
                if (available) availableCount++;
                
                const status = available ? '✅' : '❌';
                functionStatus += `${status} ${funcName}<br>`;
                log(`${status} ${funcName}: ${available}`);
            });
            
            updateStatus('function-status', functionStatus, availableCount === functions.length ? 'success' : 'warning');
            
            return availableCount === functions.length;
        }

        // Test enrollment function
        function testEnrollment(pathName) {
            log(`🧪 Testing enrollment for: ${pathName}`);
            
            if (typeof enrollInLearningPath === 'function') {
                log('✅ enrollInLearningPath function found, calling it...');
                try {
                    enrollInLearningPath(pathName);
                    log('✅ Enrollment function called successfully');
                } catch (error) {
                    log(`❌ Error calling enrollment function: ${error.message}`, 'error');
                }
            } else {
                log('❌ enrollInLearningPath function not found', 'error');
                alert(`Test: Would enroll in ${pathName} (function not available)`);
            }
        }

        // Run full diagnostic
        function runFullDiagnostic() {
            log('🔧 Running full diagnostic...');
            
            // Check if academy.js loaded
            const scriptLoaded = document.querySelector('script[src*="academy.js"]') !== null;
            log(`Script loaded: ${scriptLoaded ? '✅' : '❌'}`);
            
            // Check functions
            const functionsOk = checkFunctions();
            
            // Check for errors
            const errors = window.onerror ? 'Has global error handler' : 'No global error handler';
            log(`Error handling: ${errors}`);
            
            // Update system status
            const status = functionsOk ? 'All systems operational' : 'Some functions missing';
            const statusType = functionsOk ? 'success' : 'warning';
            updateStatus('system-status', status, statusType);
            
            log('🔧 Full diagnostic complete');
        }

        // Clear log
        function clearLog() {
            document.getElementById('debug-log').innerHTML = '<div>Log cleared...</div>';
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Page loaded, starting diagnostic...');
            
            // Wait a bit for scripts to load
            setTimeout(() => {
                checkFunctions();
                runFullDiagnostic();
            }, 1000);
        });

        // Also check if DOM is already loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(() => {
                    checkFunctions();
                    runFullDiagnostic();
                }, 1000);
            });
        } else {
            setTimeout(() => {
                checkFunctions();
                runFullDiagnostic();
            }, 1000);
        }

        // Global error handler
        window.onerror = function(message, source, lineno, colno, error) {
            log(`❌ JavaScript Error: ${message} at ${source}:${lineno}`, 'error');
            return true;
        };
    </script>



<script>
    document.addEventListener('DOMContentLoaded', function() {
        const phrases = [
            "Welcome to Trendtactics Digital",
            "Read our latest blog: The Future of AI",
            "Next Event: Digital Growth Webinar - Oct 25",
            "Scale your revenue with our experts",
            "" 
        ];
        let i = 0;
        let j = 0;
        let currentPhrase = [];
        let isDeleting = false;
        let isEnd = false;
        
        const typeWriterElement = document.getElementById('typewriter-text');
        
        function loop() {
            if (!typeWriterElement) return;
            
            // Add live time to the last phrase dynamically
            phrases[4] = "Current Local Time: " + new Date().toLocaleTimeString();
            
            isEnd = false;
            typeWriterElement.innerHTML = currentPhrase.join('');
            
            if (i < phrases.length) {
                if (!isDeleting && j <= phrases[i].length) {
                    currentPhrase.push(phrases[i][j]);
                    j++;
                    typeWriterElement.innerHTML = currentPhrase.join('');
                }
                
                if (isDeleting && j <= phrases[i].length) {
                    currentPhrase.pop();
                    j--;
                    typeWriterElement.innerHTML = currentPhrase.join('');
                }
                
                if (j == phrases[i].length) {
                    isEnd = true;
                    isDeleting = true;
                }
                
                if (isDeleting && j === 0) {
                    currentPhrase = [];
                    isDeleting = false;
                    i++;
                    if (i === phrases.length) {
                        i = 0;
                    }
                }
            }
            
            const speeding = Math.random() * (50 - 30) + 30;
            const normal = Math.random() * (100 - 50) + 50;
            const time = isEnd ? 2000 : isDeleting ? speeding : normal;
            
            setTimeout(loop, time);
        }
        
        if (typeWriterElement) {
            loop();
        }
    });
</script>
